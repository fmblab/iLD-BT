name: ugt76g1
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - numpy
  - pandas
  - scipy
  - scikit-learn>=1.5
  - matplotlib
  - openpyxl
  - xlrd
  - biopython
  - xgboost
  - jupyterlab
  - notebook
  - pip
  - pip:
    - tmtools   # optional: TM-align path in src/structure.py (SVD/Ca-distance paths need only biopython)
# NOTE: versions are intentionally left unpinned for portability. For exact
# reproduction of the published rank statistics, pin scikit-learn / scipy to the
# analysis environment used to GENERATE the stored predictions (the figure scripts
# plot stored predictions, so they do not depend on the training versions).
